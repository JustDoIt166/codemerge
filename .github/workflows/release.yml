name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-xcb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build binary
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build and collect Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          cargo deb --no-build
          DEB_PATH="$(find target/debian -maxdepth 1 -type f -name '*.deb' | head -n1)"
          cp "${DEB_PATH}" "dist/codemerge-${VERSION}-linux-amd64.deb"

          tar -C target/release -czf "dist/codemerge-${VERSION}-linux-amd64.tar.gz" codemerge

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ImageMagick
        run: choco install imagemagick -y --no-progress

      - name: Generate Windows app icon
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          magick assets/fonts/logo.svg -background none -define icon:auto-resize=16,24,32,48,64,128,256 assets/app.ico

      - name: Build binary
        run: cargo build --release --locked

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build and collect Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          magick assets/fonts/logo.svg -background none -define icon:auto-resize=16,24,32,48,64,128,256 dist/codemerge.ico

          Compress-Archive -Path target/release/codemerge.exe -DestinationPath "dist/codemerge-$version-windows-amd64.zip" -Force

          $env:APP_VERSION = $version
          $env:BINARY_PATH = (Resolve-Path "target/release/codemerge.exe").Path
          $env:ICON_PATH = (Resolve-Path "dist/codemerge.ico").Path
          $env:OUTPUT_DIR = (Resolve-Path "dist").Path
          $env:INSTALLER_BASENAME = "codemerge-$version-windows-amd64-setup"

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "packaging/windows/codemerge.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/linux-amd64/*
            release-assets/windows-amd64/*
