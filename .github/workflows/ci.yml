name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    name: Format, Clippy, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Verify tracked assets
        shell: bash
        run: |
          set -euo pipefail
          test -f assets/app.ico
          test -f assets/fonts/logo.svg
          test -d assets/icons
          test -n "$(find assets/icons -maxdepth 1 -type f | head -n1)"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  macos-build:
    name: Build And Test macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: amd64
            target: x86_64-apple-darwin
          - runner: macos-15
            arch: arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify tracked assets
        shell: bash
        run: |
          set -euo pipefail
          test -f assets/app.ico
          test -f assets/fonts/logo.svg
          test -d assets/icons
          test -n "$(find assets/icons -maxdepth 1 -type f | head -n1)"

      - name: Build binary
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --target ${{ matrix.target }}

  windows-check:
    name: Check And Test Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tracked assets
        shell: pwsh
        run: |
          if (!(Test-Path assets/app.ico)) { throw "missing assets/app.ico" }
          if (!(Test-Path assets/fonts/logo.svg)) { throw "missing assets/fonts/logo.svg" }
          if (!(Test-Path assets/icons)) { throw "missing assets/icons" }
          if (-not (Get-ChildItem assets/icons -File | Select-Object -First 1)) { throw "assets/icons is empty" }

      - name: Check build
        run: cargo check --locked --all-targets

      - name: Run tests
        run: cargo test --locked
